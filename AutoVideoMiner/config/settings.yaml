system:
  max_token_threshold: 0.8
  probe_size: 5
  sweep_limit: 50
  evaluator_pass_threshold: 0.8

agents:
  planner_agent:
    llm:
      provider: aws_bedrock
      model_id: amazon.nova-lite-v1:0
      temperature: 0
      region_env: PLANNER_AWS_REGION
      access_key_env: PLANNER_AWS_ACCESS_KEY_ID
      secret_key_env: PLANNER_AWS_SECRET_ACCESS_KEY
      session_token_env: PLANNER_AWS_SESSION_TOKEN
    embedding:
      provider: aws_bedrock
      model_id: amazon.titan-embed-text-v1
      region_env: PLANNER_AWS_REGION
      access_key_env: PLANNER_AWS_ACCESS_KEY_ID
      secret_key_env: PLANNER_AWS_SECRET_ACCESS_KEY
      session_token_env: PLANNER_AWS_SESSION_TOKEN

  crawler_agent:
    llm:
      provider: aws_bedrock
      model_id: amazon.nova-lite-v1:0
      temperature: 0
      region_env: CRAWLER_AWS_REGION
      access_key_env: CRAWLER_AWS_ACCESS_KEY_ID
      secret_key_env: CRAWLER_AWS_SECRET_ACCESS_KEY
      session_token_env: CRAWLER_AWS_SESSION_TOKEN
    embedding:
      provider: aws_bedrock
      model_id: amazon.titan-embed-text-v1
      region_env: CRAWLER_AWS_REGION
      access_key_env: CRAWLER_AWS_ACCESS_KEY_ID
      secret_key_env: CRAWLER_AWS_SECRET_ACCESS_KEY
      session_token_env: CRAWLER_AWS_SESSION_TOKEN

  evaluator_agent:
    llm:
      provider: aws_bedrock
      model_id: amazon.nova-lite-v1:0
      temperature: 0
      region_env: EVALUATOR_AWS_REGION
      access_key_env: EVALUATOR_AWS_ACCESS_KEY_ID
      secret_key_env: EVALUATOR_AWS_SECRET_ACCESS_KEY
      session_token_env: EVALUATOR_AWS_SESSION_TOKEN
    embedding:
      provider: aws_bedrock
      model_id: amazon.titan-embed-text-v1
      region_env: EVALUATOR_AWS_REGION
      access_key_env: EVALUATOR_AWS_ACCESS_KEY_ID
      secret_key_env: EVALUATOR_AWS_SECRET_ACCESS_KEY
      session_token_env: EVALUATOR_AWS_SESSION_TOKEN

  segmentation_agent:
    llm:
      provider: aws_bedrock
      model_id: amazon.nova-lite-v1:0
      temperature: 0
      region_env: SEGMENTATION_AWS_REGION
      access_key_env: SEGMENTATION_AWS_ACCESS_KEY_ID
      secret_key_env: SEGMENTATION_AWS_SECRET_ACCESS_KEY
      session_token_env: SEGMENTATION_AWS_SESSION_TOKEN
    embedding:
      provider: aws_bedrock
      model_id: amazon.titan-embed-text-v1
      region_env: SEGMENTATION_AWS_REGION
      access_key_env: SEGMENTATION_AWS_ACCESS_KEY_ID
      secret_key_env: SEGMENTATION_AWS_SECRET_ACCESS_KEY
      session_token_env: SEGMENTATION_AWS_SESSION_TOKEN

  explorer_agent:
    llm:
      provider: aws_bedrock
      model_id: amazon.nova-lite-v1:0
      temperature: 0
      region_env: EXPLORER_AWS_REGION
      access_key_env: EXPLORER_AWS_ACCESS_KEY_ID
      secret_key_env: EXPLORER_AWS_SECRET_ACCESS_KEY
      session_token_env: EXPLORER_AWS_SESSION_TOKEN
    embedding:
      provider: aws_bedrock
      model_id: amazon.titan-embed-text-v1
      region_env: EXPLORER_AWS_REGION
      access_key_env: EXPLORER_AWS_ACCESS_KEY_ID
      secret_key_env: EXPLORER_AWS_SECRET_ACCESS_KEY
      session_token_env: EXPLORER_AWS_SESSION_TOKEN
